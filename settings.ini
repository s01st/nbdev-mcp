[DEFAULT]
# All sections below are required unless otherwise specified.
# See https://github.com/AnswerDotAI/nbdev/blob/main/settings.ini for examples.

### Python library ###
repo = nbdev-mcp
lib_name = %(repo)s
version = 0.1.0
min_python = 3.12
license = apache2
black_formatting = False

### nbdev ###
doc_path = _docs
lib_path = nbdev_mcp
nbs_path = nbs
recursive = True
tst_flags = notest
put_version_in_init = True
update_pyproject = True

### Docs ###
branch = main
custom_sidebar = False
doc_host = https://%(user)s.github.io
doc_baseurl = /%(repo)s
git_url = https://github.com/%(user)s/%(repo)s
title = %(lib_name)s

### PyPI ###
audience = Developers
author = s01st
author_email =
copyright = 2025 onwards, %(author)s
description = MCP server for nbdev projects - analyze, lint, test, and manage notebook-driven Python development with AI assistants
keywords = nbdev jupyter notebook python mcp model-context-protocol llm ai-assistant fastmcp literate-programming notebook-development code-analysis
language = English
status = 3
user = s01st

### Optional ###
requirements = mcp requests rich typer nbformat nbclient psutil tomli tomli-w
dev_requirements = nbdev<3 pytest pytest-asyncio execnb<0.2 fastcore<1.13
console_scripts = nbdev-mcp=nbdev_mcp.mcp:main
# conda_user =
; Templates now bundled in nbdev_mcp/prompt_templates/ via MANIFEST.in
data_files = prompt_templates = prompt_templates/*.md
